# buf.gen.yaml — code generation for non-Rust targets.
# Rust generation is handled by tonic-build in build.rs (cargo build).
#
# To regenerate for other languages, run: buf generate
version: v2
plugins:
  - remote: buf.build/bufbuild/es
    out: ../web/src/gen
  - remote: buf.build/connectrpc/es
    out: ../web/src/gen
inputs:
  - directory: proto
