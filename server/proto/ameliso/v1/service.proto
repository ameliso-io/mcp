syntax = "proto3";

package ameliso.v1;

import "ameliso/v1/types.proto";

option go_package = "github.com/tupe12334/ameliso/generated;ameliso";

// AmelisoService manages test cases, suites, and runs stored in PostgreSQL.
// All operations accept a repo_id identifying the connected GitHub repository (full_name, e.g. "owner/repo").
//
// Recommended agent workflow (minimum 3 RPCs):
//
//   Step 1 — CreateRun(commit_sha=<HEAD>, use_last_run=true)
//     Auto-scopes to cases affected since the last completed run.
//     On the first ever run (no prior run) all cases are included.
//     Response: pending (Case.body + latest_status), total_repo_cases,
//     uncovered_files (source files with no test case).
//
//   Optional Step 1b — if uncovered_files is non-empty:
//     BulkCreateCases(cases=[...], run_id=run.id)
//     Creates cases for coverage gaps AND adds them to the current run's scope.
//     Response: file_paths (for git add), pending (updated with new cases).
//
//   Step 2 — BulkRecordResults — record all results in one call.
//     Response: pending (remaining cases), pending_count, total_in_scope.
//
//   Step 3 — FinalizeRun(status=UNSPECIFIED)
//     Auto-detects ABORTED if any FAILED result, else COMPLETED.
//     Response: run (RunMeta with counts), results (all CaseResult records).
//
// Repeat from step 1 on the next commit.
//
// Additional zero-extra-RPC data available in responses:
//   GetRun        — cases field (Case list with body; no separate ListCases call needed)
//   ListRuns      — RunMeta.passed/failed/blocked/skipped/total counts per run
//   RecordResult  — pending field (remaining cases after this result)
//   GetRepoStatus — last_completed_run (RunMeta with counts)
//   UpdateRun     — add_cases to extend run scope; commit_sha/tester/environment patches
//   GetAffectedCases — cases (body + latest_status) + uncovered_files (coverage gaps)
//
// For richer context before running (stats, active runs), call GetRepoStatus first.
// For a read-only preview of affected cases, call GetAffectedCases instead of CreateRun.
service AmelisoService {
  // --- Cases ---
  rpc ListCases(ListCasesRequest) returns (ListCasesResponse);
  rpc GetCase(GetCaseRequest) returns (GetCaseResponse);
  rpc CreateCase(CreateCaseRequest) returns (CreateCaseResponse);
  rpc BulkCreateCases(BulkCreateCasesRequest) returns (BulkCreateCasesResponse);
  rpc UpdateCase(UpdateCaseRequest) returns (UpdateCaseResponse);
  rpc BulkUpdateCases(BulkUpdateCasesRequest) returns (BulkUpdateCasesResponse);
  rpc DeleteCase(DeleteCaseRequest) returns (DeleteCaseResponse);
  rpc BulkDeleteCases(BulkDeleteCasesRequest) returns (BulkDeleteCasesResponse);

  // --- Suites ---
  rpc ListSuites(ListSuitesRequest) returns (ListSuitesResponse);
  rpc GetSuite(GetSuiteRequest) returns (GetSuiteResponse);
  rpc CreateSuite(CreateSuiteRequest) returns (CreateSuiteResponse);
  rpc UpdateSuite(UpdateSuiteRequest) returns (UpdateSuiteResponse);
  rpc DeleteSuite(DeleteSuiteRequest) returns (DeleteSuiteResponse);

  // --- Runs ---
  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse);
  rpc GetRun(GetRunRequest) returns (GetRunResponse);
  rpc CreateRun(CreateRunRequest) returns (CreateRunResponse);
  rpc RecordResult(RecordResultRequest) returns (RecordResultResponse);
  rpc BulkRecordResults(BulkRecordResultsRequest) returns (BulkRecordResultsResponse);
  rpc FinalizeRun(FinalizeRunRequest) returns (FinalizeRunResponse);
  rpc DeleteRun(DeleteRunRequest) returns (DeleteRunResponse);
  rpc GetPendingCases(GetPendingCasesRequest) returns (GetPendingCasesResponse);
  // Rename a run's slug (date prefix is preserved). Returns the updated run metadata.
  rpc UpdateRun(UpdateRunRequest) returns (UpdateRunResponse);

  // --- Reports ---
  // Coverage for all cases; sorted failed/never first then by priority. Optional status_filter.
  rpc GetCoverageReport(GetCoverageReportRequest) returns (GetCoverageReportResponse);
  // Return cases affected by source changes since since_ref (uses GitHub compare API).
  // Sorted failed/never first then by priority — same ordering as GetPendingCases.
  rpc GetAffectedCases(GetAffectedCasesRequest) returns (GetAffectedCasesResponse);
  // Aggregate snapshot: case counts by priority, coverage counts, suite/run totals, active runs with pending counts.
  rpc GetRepoStatus(GetRepoStatusRequest) returns (GetRepoStatusResponse);

  // --- GitHub App ---
  rpc GetGitHubInstallUrl(GetGitHubInstallUrlRequest) returns (GetGitHubInstallUrlResponse);
  rpc HandleGitHubCallback(HandleGitHubCallbackRequest) returns (HandleGitHubCallbackResponse);
  rpc ListRepositories(ListRepositoriesRequest) returns (ListRepositoriesResponse);
  rpc SyncRepository(SyncRepositoryRequest) returns (SyncRepositoryResponse);
  rpc RemoveRepository(RemoveRepositoryRequest) returns (RemoveRepositoryResponse);
}

// --- Cases ---

message ListCasesRequest {
  string repo_id = 1;
  repeated string tags = 2;
  Priority priority = 3;
  string query = 4;
  string suite = 5;
}

message ListCasesResponse {
  repeated Case cases = 1;
}

message GetCaseRequest {
  string repo_id = 1;
  string case_path = 2;
}

message GetCaseResponse {
  Case case = 1;
  string body = 2;
}

message CreateCaseRequest {
  string repo_id = 1;
  string case_path = 2;
  string title = 3;
  string description = 4;
  repeated string tags = 5;
  Priority priority = 6;
  string body = 7;
}

message CreateCaseResponse {
  Case case = 1;
  string file_path = 2;
}

message BulkCaseEntry {
  string case_path = 1;
  string title = 2;
  string description = 3;
  repeated string tags = 4;
  Priority priority = 5;
  string body = 6;
}

message BulkCreateCasesRequest {
  string repo_id = 1;
  repeated BulkCaseEntry cases = 2;
  // Optional run_id — when set, created cases are added to this run's inline scope.
  // Useful for adding newly-discovered cases (from uncovered_files) to an in-progress run
  // without a separate UpdateRun(add_cases=...) call.
  string run_id = 3;
}

message BulkCreateCasesResponse {
  repeated Case cases = 1;
  // File paths for the created cases (e.g. ".ameliso/cases/auth/login.md").
  // Agents can pass these directly to git add without constructing paths manually.
  repeated string file_paths = 2;
  // Updated pending entries for the run, when run_id was set in the request.
  // Avoids a separate GetPendingCases call after adding the new cases to the run.
  repeated PendingEntry pending = 3;
}

message UpdateCaseRequest {
  string repo_id = 1;
  string case_path = 2;
  string title = 3;
  string description = 4;
  repeated string tags = 5;
  Priority priority = 6;
  string body = 7;
  // When non-empty, rename the case to this path. Must be unique within the repo.
  // Also updates any suites that reference the old path.
  string new_path = 8;
}

message UpdateCaseResponse {
  Case case = 1;
}

message BulkUpdateEntry {
  string case_path = 1;
  string title = 2;
  string description = 3;
  repeated string tags = 4;
  Priority priority = 5;
  string body = 6;
}

message BulkUpdateCasesRequest {
  string repo_id = 1;
  repeated BulkUpdateEntry cases = 2;
}

message BulkUpdateCasesResponse {
  repeated Case cases = 1;
}

message DeleteCaseRequest {
  string repo_id = 1;
  string case_path = 2;
}

message DeleteCaseResponse {
  string file_path = 1;
}

message BulkDeleteCasesRequest {
  string repo_id = 1;
  repeated string case_paths = 2;
}

message BulkDeleteCasesResponse {
  repeated string file_paths = 1;
}

// --- Suites ---

message ListSuitesRequest {
  string repo_id = 1;
}

message ListSuitesResponse {
  repeated Suite suites = 1;
}

message GetSuiteRequest {
  string repo_id = 1;
  string slug = 2;
}

message GetSuiteResponse {
  Suite suite = 1;
}

message CreateSuiteRequest {
  string repo_id = 1;
  string slug = 2;
  string name = 3;
  string description = 4;
  repeated string cases = 5;
}

message CreateSuiteResponse {
  Suite suite = 1;
  string file_path = 2;
}

message UpdateSuiteRequest {
  string repo_id = 1;
  string slug = 2;
  string name = 3;
  string description = 4;
  repeated string cases = 5;
  // When true, replace the case list with `cases` (even if empty). When false (default), `cases` is ignored.
  bool replace_cases = 6;
  // When non-empty, rename the suite to this slug. Must be unique within the repo.
  string new_slug = 7;
}

message UpdateSuiteResponse {
  Suite suite = 1;
}

message DeleteSuiteRequest {
  string repo_id = 1;
  string slug = 2;
}

message DeleteSuiteResponse {
  string file_path = 1;
}

// --- Runs ---

message ListRunsRequest {
  string repo_id = 1;
  RunStatus status = 2;
}

message ListRunsResponse {
  repeated RunMeta runs = 1;
}

message GetRunRequest {
  string repo_id = 1;
  string run_id = 2;
}

message GetRunResponse {
  Run run = 1;
  // In-scope cases for this run — same set as GetPendingCases returns for a pending run.
  // Populated so callers can avoid a separate ListCases call.
  repeated Case cases = 2;
}

message CreateRunRequest {
  string repo_id = 1;
  // Human-readable slug appended to the date prefix to form run_id (e.g. "smoke").
  // When empty, the server auto-generates a unique slug from the current timestamp.
  string slug = 2;
  string tester = 3;
  string environment = 4;
  string suite = 5;
  // Optional inline case list — when set, the run is scoped to these cases without
  // requiring a pre-existing suite. Mutually exclusive with `suite`, `since_ref`, and `changed_files`.
  repeated string cases = 6;
  // Optional git commit SHA (HEAD at run creation time). Stored in RunMeta so agents
  // can later pass it as `since_ref` in GetAffectedCases or CreateRun on the next iteration.
  string commit_sha = 7;
  // Auto-scope this run to cases affected since this git ref (uses GitHub compare API).
  // Mutually exclusive with `suite`, `cases`, and `use_last_run`. When `changed_files` is also
  // set, `changed_files` takes priority and no GitHub call is made.
  string since_ref = 8;
  // Pass `git diff --name-only <ref>` output to scope the run without a GitHub call.
  // Mutually exclusive with `suite`, `cases`, and `use_last_run`.
  repeated string changed_files = 9;
  // When true, auto-scope to cases affected since the last completed run's commit_sha.
  // Equivalent to since_ref=<last_completed_run.commit_sha>. If no completed run exists
  // or it has no commit_sha, all cases are included.
  // Mutually exclusive with `suite`, `cases`, `since_ref`, and `changed_files`.
  bool use_last_run = 10;
}

message CreateRunResponse {
  RunMeta run = 1;
  string dir_path = 2;
  // Pending cases at run creation time — same as GetPendingCases.pending.
  // Lets agents start executing immediately without a separate GetPendingCases call.
  repeated PendingEntry pending = 3;
  // Total cases in the repo (not just this run's scope). Lets agents compute
  // what fraction of the suite is being covered without a separate GetRepoStatus call.
  int32 total_repo_cases = 4;
  // Source files touched by the diff (since_ref / use_last_run / changed_files) that have
  // no matching test case — i.e., coverage gaps. Agents can use this list to decide which
  // new cases to create without a separate GetAffectedCases call.
  // Empty when the run is not scoped by a diff (suite, inline cases, or all cases).
  repeated string uncovered_files = 5;
}

message RecordResultRequest {
  string repo_id = 1;
  string run_id = 2;
  string case_path = 3;
  ResultStatus status = 4;
  string notes = 5;
}

message RecordResultResponse {
  CaseResult result = 1;
  int32 pending_count = 2;
  int32 total_in_scope = 3;
  // Remaining pending cases after this result — lets agents skip a separate
  // GetPendingCases call when testing sequentially.
  repeated PendingEntry pending = 4;
}

message BulkResultEntry {
  string case_path = 1;
  ResultStatus status = 2;
  string notes = 3;
}

message BulkRecordResultsRequest {
  string repo_id = 1;
  string run_id = 2;
  repeated BulkResultEntry results = 3;
}

message BulkRecordResultsResponse {
  repeated CaseResult results = 1;
  int32 pending_count = 2;
  int32 total_in_scope = 3;
  // Remaining pending cases after bulk recording — lets agents confirm completion
  // or find remaining cases without a separate GetPendingCases call.
  repeated PendingEntry pending = 4;
}

message FinalizeRunRequest {
  string repo_id = 1;
  string run_id = 2;
  // Desired final status. When UNSPECIFIED (or omitted), the server auto-detects:
  // ABORTED if any recorded result is FAILED, otherwise COMPLETED.
  RunStatus status = 3;
}

message FinalizeRunResponse {
  RunMeta run = 1;
  // All results for the finalized run — avoids a separate GetRun call when agents
  // need to inspect which cases failed or were blocked.
  repeated CaseResult results = 2;
}

message DeleteRunRequest {
  string repo_id = 1;
  string run_id = 2;
}

message DeleteRunResponse {
  string dir_path = 1;
}

message GetPendingCasesRequest {
  string repo_id = 1;
  string run_id = 2;
  // When set (non-UNSPECIFIED), only return pending cases at this priority level.
  // Useful for agents that want to tackle high-priority cases first.
  Priority priority_filter = 3;
}

// A pending test case with status — for agent-friendly GetPendingCases and CreateRun.
// case.body is always populated; the top-level body field is deprecated.
message PendingEntry {
  Case case = 1;
  // Deprecated: use case.body instead (Case.body is now always populated).
  string body = 2;
  ResultStatus latest_status = 3;
}

message GetPendingCasesResponse {
  // Deprecated: use pending instead — it includes body and latest_status.
  repeated Case cases = 1;
  int32 total_in_scope = 2;
  // Deprecated: use pending instead — PendingEntry already has latest_status.
  repeated CoverageEntry entries = 3;
  // Preferred: full pending case data — case metadata (with body) + latest_status.
  // Sorted failed/never first then by case priority.
  repeated PendingEntry pending = 4;
}

message UpdateRunRequest {
  string repo_id = 1;
  string run_id = 2;
  // New slug portion only; date prefix (YYYY-MM-DD) is preserved.
  // The resulting new run_id will be "{date_prefix}-{new_slug}".
  string new_slug = 3;
  // Optional metadata updates — only applied when the field is non-empty.
  // Use these to patch commit_sha, tester, or environment after creation.
  optional string commit_sha = 4;
  optional string tester = 5;
  optional string environment = 6;
  // Extend the run's inline case scope with these additional case paths.
  // Only valid for inline-scoped runs (created with use_last_run, since_ref, changed_files, or cases).
  // Idempotent — already-included case paths are ignored.
  // Use this after BulkCreateCases to add newly-created cases to an in-progress run.
  repeated string add_cases = 7;
}

message UpdateRunResponse {
  RunMeta run = 1;
  string new_dir_path = 2;
  // Updated pending cases after any add_cases — avoids a separate GetPendingCases call.
  // Populated only when add_cases is non-empty.
  repeated PendingEntry pending = 3;
}

// --- Reports ---

message GetCoverageReportRequest {
  string repo_id = 1;
  ResultStatus status_filter = 2;
}

message GetCoverageReportResponse {
  repeated CoverageEntry entries = 1;
  int32 run_count = 2;
}

message GetAffectedCasesRequest {
  string repo_id = 1;
  string since_ref = 2;
  // If set, skip GitHub comparison and match cases against these file paths directly.
  // Pass output of `git diff --name-only <ref>` for local workflows without GitHub.
  repeated string changed_files = 3;
  // When set (non-UNSPECIFIED), only return affected cases at this priority level.
  Priority priority_filter = 4;
  // When non-empty, only return affected cases that have ALL of these tags.
  repeated string tags = 5;
}

message GetAffectedCasesResponse {
  repeated AffectedCase cases = 1;
  string reason = 2;
  // Changed files that have no matching test case — i.e., coverage gaps.
  // Agents can use this list to decide which new cases to create.
  // Doc files (.md, .yml, etc.) are excluded.
  repeated string uncovered_files = 3;
}

// --- Repo Status ---

message GetRepoStatusRequest {
  string repo_id = 1;
}

message ActiveRunStatus {
  string run_id = 1;
  string tester = 2;
  string suite = 3;
  string date = 4;
  int32 pending_cases = 5;
  int32 total_in_scope = 6;
  string commit_sha = 7;
  string environment = 8;
}

message GetRepoStatusResponse {
  int32 total_cases = 1;
  int32 high_cases = 2;
  int32 medium_cases = 3;
  int32 low_cases = 4;
  int32 passed = 5;
  int32 failed = 6;
  int32 blocked = 7;
  int32 skipped = 8;
  int32 never_run = 9;
  int32 suite_count = 10;
  int32 run_count = 11;
  repeated ActiveRunStatus active_runs = 12;
  // Most recently completed run — commit_sha can be passed as since_ref to GetAffectedCases
  // without a separate ListRuns call.
  RunMeta last_completed_run = 13;
}

// --- GitHub App ---

message GetGitHubInstallUrlRequest {}

message GetGitHubInstallUrlResponse {
  string url = 1;
  bool configured = 2;
}

message HandleGitHubCallbackRequest {
  string installation_id = 1;
}

message HandleGitHubCallbackResponse {
  repeated Repository repositories = 1;
}

message ListRepositoriesRequest {}

message ListRepositoriesResponse {
  repeated Repository repositories = 1;
}

message SyncRepositoryRequest {
  string id = 1;
}

message SyncRepositoryResponse {
  Repository repository = 1;
}

message RemoveRepositoryRequest {
  string id = 1;
}

message RemoveRepositoryResponse {}
