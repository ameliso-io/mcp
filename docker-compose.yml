services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ameliso
      POSTGRES_PASSWORD: ameliso
      POSTGRES_DB: ameliso
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ameliso -d ameliso"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
