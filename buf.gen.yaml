version: v2
inputs:
  - directory: proto
plugins:
  - protoc_builtin: prost
    out: generated/server
    opt:
      - compile_well_known_types=true
      - extern_path=.google.protobuf=::pbjson_types
  - protoc_builtin: tonic
    out: generated/server
    opt:
      - compile_well_known_types=true
      - extern_path=.google.protobuf=::pbjson_types
